<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدى الطفولة | جزيرة الكنز</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --accent: #ff9800; --bg: #0b0f19; --card: #161e2e; }
        * { user-select: none; }
        body {
            background-color: var(--bg); color: white; font-family: 'Cairo', sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; position: relative;
        }
        header {
            width: 100%; background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            padding: 40px 0; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        header h1 { margin: 0; font-size: 2.2rem; }
        header p { margin: 5px 0 0; font-size: 1rem; }
        .banner-top, .banner-bottom {
            width: 100%; text-align: center; background: #0a0e15; padding: 20px 0;
            margin: 0 auto; display: flex; justify-content: center; align-items: center;
            border-radius: 12px; overflow-x: auto;
        }
        .banner-top { max-width: 900px; margin-top: 20px; margin-bottom: 10px; }
        .banner-bottom { max-width: 900px; margin-top: 30px; margin-bottom: 20px; }
        .main-container { max-width: 900px; width: 95%; margin: 0 auto; text-align: center; }
        .video-wrapper-outer { position: relative; z-index: 1; }
        .video-display-area {
            background: #000; border-radius: 20px; overflow: hidden; border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); margin-bottom: 30px; display: none; position: relative;
        }
        .responsive-iframe {
            position: relative; width: 100%; aspect-ratio: 16 / 9;
            background: #000; overflow: hidden;
        }
        /* رفع المشغل الأساسي - نفس الإعدادات السابقة */
        .responsive-iframe iframe {
            position: absolute; top: -160px; left: 0; width: 100%; height: calc(100% + 160px);
            border: 0; overflow: hidden; pointer-events: auto;
        }
        .episodes-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 15px; background: var(--card); padding: 25px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .ep-btn {
            background: #252f44; color: white; border: 2px solid transparent;
            padding: 15px 0; border-radius: 12px; font-size: 1.2rem;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .ep-btn:hover { background: var(--primary); transform: scale(1.1); border-color: white; }
        .ep-btn.active { background: var(--accent); color: black; box-shadow: 0 0 15px var(--accent); }
        .info-text { margin-top: 20px; color: var(--primary); font-size: 1.1rem; }
        footer { margin-top: 50px; padding: 20px; opacity: 0.4; font-size: 0.8rem; }
        h2#status-msg { margin-top: 10px; }
        @media (max-width: 600px) {
            .episodes-grid { grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; padding: 15px; }
            .ep-btn { padding: 10px 0; font-size: 1rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>🎬 صدى الطفولة</h1>
    <p>اختر رقم الحلقة وابدأ المشاهدة فوراً</p>
</header>

<!-- بنر أعلى الموقع -->
<div class="banner-top">
    <script>
        atOptions = { 'key' : 'b8ba5b25ff25e41ea44c2df3a1b05378', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
    </script>
    <script src="https://www.highperformanceformat.com/b8ba5b25ff25e41ea44c2df3a1b05378/invoke.js"></script>
</div>

<div class="main-container">
    <div class="video-wrapper-outer">
        <div id="videoPlayer" class="video-display-area">
            <div class="responsive-iframe">
                <iframe id="mainIframe" src="" allowfullscreen scrolling="no"></iframe>
            </div>
            <div id="episodeTitle" style="padding: 10px; background: var(--card); font-weight: bold;"></div>
        </div>
    </div>
    <h2 id="status-msg">اضغط على رقم الحلقة للمشاهدة:</h2>
    <div class="episodes-grid" id="buttonsGrid"></div>
    <p class="info-text">جميع حلقات جزيرة الكنز (26 حلقة) متوفرة الآن بجودة عالية</p>
</div>

<!-- بنر أسفل الموقع -->
<div class="banner-bottom">
    <script>
        atOptions = { 'key' : 'b8ba5b25ff25e41ea44c2df3a1b05378', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
    </script>
    <script src="https://www.highperformanceformat.com/b8ba5b25ff25e41ea44c2df3a1b05378/invoke.js"></script>
</div>

<footer>جميع الحقوق محفوظة - صدى الطفولة &copy; 2026</footer>

<script>
    // إعدادات مسلسل جزيرة الكنز - 26 حلقة (يمكنك تغيير هذا الرقم)
    const totalEpisodes = 26;
    const episodeLinks = [];

    // الحلقة 1 = 370، الحلقة 26 = 395
    for (let i = 0; i < totalEpisodes; i++) {
        let episodeId = 370 + i;
        episodeLinks.push(`https://cartoony.net/watch/46/${episodeId}`);
    }

    const grid = document.getElementById('buttonsGrid');
    const player = document.getElementById('videoPlayer');
    const iframe = document.getElementById('mainIframe');
    const titleDisp = document.getElementById('episodeTitle');
    
    let scrollPosition = 0;
    let bodyStylePosition = '';
    let bodyStyleTop = '';

    function lockPage() {
        scrollPosition = window.scrollY;
        bodyStylePosition = document.body.style.position || '';
        bodyStyleTop = document.body.style.top || '';
        document.body.style.position = 'fixed';
        document.body.style.top = `-${scrollPosition}px`;
        document.body.style.width = '100%';
    }

    function unlockPage() {
        document.body.style.position = bodyStylePosition;
        document.body.style.top = bodyStyleTop;
        document.body.style.width = '';
        window.scrollTo(0, scrollPosition);
    }

    episodeLinks.forEach((link, index) => {
        const btn = document.createElement('button');
        btn.className = 'ep-btn';
        btn.innerText = index + 1;
        btn.onclick = function() {
            lockPage();
            player.style.display = 'block';
            iframe.src = link;
            titleDisp.innerText = "أنت تشاهد الآن: جزيرة الكنز - الحلقة " + (index + 1);
            document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            setTimeout(() => { unlockPage(); }, 500);
        };
        grid.appendChild(btn);
    });
    
    iframe.addEventListener('load', function() {
        try {
            iframe.contentWindow.addEventListener('scroll', function(e) {
                iframe.contentWindow.scrollTo(0, 0);
            });
        } catch(e) { /* تجاهل أخطاء CORS */ }
    });
</script>

</body>
</html>
