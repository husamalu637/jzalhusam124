<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدى الطفولة | جزيرة الكنز</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght=600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #ff9800;
            --bg: #0b0f19;
            --card: #161e2e;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            padding: 40px 0;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        /* ستايل البنرات */
        .banner-top, .banner-bottom {
            width: 100%;
            text-align: center;
            background: #0a0e15;
            padding: 20px 0;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            overflow-x: auto;
        }
        .banner-top {
            max-width: 900px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .banner-bottom {
            max-width: 900px;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        .main-container {
            max-width: 900px;
            width: 95%;
            margin: 20px auto;
            text-align: center;
        }

        .video-display-area {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            margin-bottom: 30px;
            display: none;
            position: relative;
        }

        .responsive-iframe {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .responsive-iframe iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 15px;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .ep-btn {
            background: #252f44;
            color: white;
            border: 2px solid transparent;
            padding: 15px 0;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .ep-btn:hover {
            background: var(--primary);
            transform: scale(1.1);
            border-color: white;
        }

        .ep-btn.active {
            background: var(--accent);
            color: black;
            box-shadow: 0 0 15px var(--accent);
        }

        .info-text {
            margin-top: 20px;
            color: var(--primary);
            font-size: 1.1rem;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            opacity: 0.4;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>صدى الطفولة</h1>
    <p>جزيرة الكنز - اختر رقم الحلقة وابدأ المغامرة</p>
</header>

<!-- ===== بنر أعلى الموقع ===== -->

<div class="main-container">

        </div>
        <div id="episodeTitle" style="padding: 10px; background: var(--card); font-weight: bold;"></div>
    </div>

    <h2 id="status-msg">اضغط على رقم الحلقة للمشاهدة:</h2>

    <p class="info-text">جميع حلقات جزيرة الكنز متوفرة الآن بجودة عالية</p>
</div>

    const grid = document.getElementById('buttonsGrid');
    const player = document.getElementById('videoPlayer');
    const iframe = document.getElementById('mainIframe');
    const titleDisp = document.getElementById('episodeTitle');

    episodes.forEach(ep => {
        const btn = document.createElement('button');
        btn.className = 'ep-btn';
        btn.innerText = ep.n;
        btn.onclick = function() {
            // تم إزالة النافذة المنبثقة - فقط البنرات الثابتة تظهر
            loadEpisode(ep.n, ep.src, btn);
        };
        grid.appendChild(btn);
    });

    function loadEpisode(num, url, btnElement) {
        player.style.display = 'block';
        iframe.src = url;
        titleDisp.innerText = "أنت تشاهد الآن: جزيرة الكنز - الحلقة " + num;
        
        document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
        btnElement.classList.add('active');
        
        player.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
</script>

</html>
